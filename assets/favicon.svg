<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: dark rounded square matching the page background -->
  <rect width="32" height="32" rx="7" fill="#0f1625"/>
  <!-- Gradient: purple → orange, matching the template accent colors -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a166ff"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
  </defs>
  <!-- Cloud shape: overlapping circles + base rectangle -->
  <circle cx="11" cy="19" r="5"   fill="url(#g)"/>
  <circle cx="17" cy="14" r="6"   fill="url(#g)"/>
  <circle cx="22" cy="19" r="4"   fill="url(#g)"/>
  <rect   x="6"  y="19"  width="20" height="5" rx="2" fill="url(#g)"/>
</svg>
